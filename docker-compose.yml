version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: encurtador-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: encurtador_db
    ports:
      - "5433:5432"

  redis:
    image: redis:latest
    container_name: encurtador-redis
    ports:
      - "6379:6379"